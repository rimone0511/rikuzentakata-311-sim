<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>陸前高田 3.11 津波避難シミュレーション(開発中)</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #1a1a1a; }
  #app { width: 100%; height: 100%; }
  #hud {
    position: fixed; top: 12px; left: 12px; color: #fff;
    font-family: "Yu Gothic UI", "Hiragino Sans", sans-serif;
    font-size: 14px; line-height: 1.7; pointer-events: none;
    text-shadow: 0 1px 3px rgba(0,0,0,.8);
  }
  #hud .clock { font-size: 26px; font-weight: bold; letter-spacing: 1px; }
  #controls {
    position: fixed; bottom: 12px; left: 12px; color: #ccc;
    font-family: "Yu Gothic UI", sans-serif; font-size: 12px; line-height: 1.6;
    text-shadow: 0 1px 3px rgba(0,0,0,.8);
  }
  #timescale { position: fixed; top: 12px; right: 12px; font-family: "Yu Gothic UI", sans-serif; }
  #timescale button {
    background: rgba(0,0,0,.55); color: #fff; border: 1px solid #666;
    padding: 4px 10px; margin-left: 4px; cursor: pointer; font-size: 13px;
  }
  #timescale button.active { background: #b33; border-color: #d55; }
  #whiteout {
    position: fixed; inset: 0; background: #fff; opacity: 0;
    transition: opacity 6s ease; pointer-events: none;
    display: flex; align-items: center; justify-content: center;
  }
  #whiteout.shown { opacity: 1; pointer-events: auto; }
  #whiteout .facts {
    max-width: 560px; color: #333; font-family: "Yu Gothic", serif;
    font-size: 15px; line-height: 2.2; opacity: 0; transition: opacity 3s ease 5s;
    padding: 24px; text-align: center;
  }
  #whiteout.shown .facts { opacity: 1; }
  #notice {
    position: fixed; inset: 0; background: rgba(10,10,12,.96); color: #ddd;
    display: flex; align-items: center; justify-content: center; z-index: 10;
    font-family: "Yu Gothic", serif;
  }
  #notice .box { max-width: 620px; padding: 32px; line-height: 2.1; font-size: 14px; }
  #notice h1 { font-size: 18px; font-weight: normal; letter-spacing: 2px; }
  #notice button {
    margin-top: 20px; padding: 10px 28px; font-size: 14px; cursor: pointer;
    background: #333; color: #eee; border: 1px solid #777;
  }
  #loading { position: fixed; bottom: 12px; right: 12px; color: #888; font: 12px sans-serif; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="app"></div>

<div id="hud">
  <div class="clock" id="clock">14:46</div>
  <div id="status"></div>
</div>

<div id="timescale">
  <button data-scale="1" class="active">1x</button>
  <button data-scale="5">5x</button>
  <button data-scale="10">10x</button>
  <button data-scale="30">30x</button>
</div>

<div id="controls">
  クリックで操作開始 / WASD:移動 / Shift:走る / V:視点切替 / ESC:カーソル解放
</div>

<div id="whiteout">
  <div class="facts" id="facts"></div>
</div>

<div id="notice">
  <div class="box">
    <h1>陸前高田 3.11 津波避難シミュレーション(開発版)</h1>
    <p>
      これは 2011年3月11日の東日本大震災における津波避難を学ぶための
      教育用シミュレーションです。娯楽を目的としたものではありません。<br>
      実在の犠牲者・生存者個人を再現するものではなく、
      公開された調査資料に基づく近似的な再現です。
    </p>
    <p style="color:#999; font-size:12px;">
      地形:国土地理院 標高タイル / 地図データ:© OpenStreetMap contributors(ODbL)
    </p>
    <button id="startBtn">開始する</button>
  </div>
</div>

<div id="loading"></div>

<script type="module" src="./src/main.js"></script>
</body>
</html>
